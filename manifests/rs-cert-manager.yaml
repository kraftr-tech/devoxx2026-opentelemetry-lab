apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  dependsOn:
    - apiVersion: fluxcd.controlplane.io/v1
      kind: ResourceSet
      name: flux-instance
      namespace: flux-system
  resources:
    - apiVersion: v1
      kind: Namespace
      metadata:
        name: cert-manager
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: HelmRepository
      metadata:
        name: cert-manager
        namespace: cert-manager
      spec:
        interval: 1h
        type: oci
        url: oci://quay.io/jetstack/charts
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: cert-manager
        namespace: cert-manager
      spec:
        interval: 1h
        releaseName: cert-manager
        chart:
          spec:
            chart: cert-manager
            version: "v1.20.x"
            sourceRef:
              kind: HelmRepository
              name: cert-manager
        values:
          crds:
            enabled: true
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 128Mi