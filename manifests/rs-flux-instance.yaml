apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: flux-instance
  namespace: flux-system
spec:
  resources:
    - apiVersion: fluxcd.controlplane.io/v1
      kind: FluxInstance
      metadata:
        name: flux
        namespace: flux-system
      spec:
        distribution:
          version: "2.7.x"
          registry: "ghcr.io/fluxcd"
          artifact: "oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests"
        cluster:
          type: kubernetes
          size: small
        components:
          - source-controller
          - kustomize-controller
          - helm-controller
          - source-watcher
