apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: collector-resources
  namespace: flux-system
spec:
  dependsOn:
    - apiVersion: fluxcd.controlplane.io/v1
      kind: ResourceSet
      name: opentelemetry-operator
      namespace: flux-system
    - apiVersion: apps/v1
      kind: Deployment
      name: opentelemetry-operator
      namespace: opentelemetry-operator-system
      ready: true
    - apiVersion: fluxcd.controlplane.io/v1
      kind: ResourceSet
      name: tempo
      namespace: flux-system
    - apiVersion: fluxcd.controlplane.io/v1
      kind: ResourceSet
      name: victoria-metrics
      namespace: flux-system
  resources:
    - apiVersion: v1
      kind: Secret
      metadata:
        name: grafana-cloud
        namespace: workshop
      type: Opaque
      stringData:
        GRAFANA_CLOUD_OTLP_ENDPOINT: "__GRAFANA_CLOUD_OTLP_ENDPOINT__"
        GRAFANA_CLOUD_INSTANCE_ID: "__GRAFANA_CLOUD_INSTANCE_ID__"
        GRAFANA_CLOUD_API_KEY: "__GRAFANA_CLOUD_API_KEY__"

    - apiVersion: opentelemetry.io/v1beta1
      kind: OpenTelemetryCollector
      metadata:
        name: workshop
        namespace: workshop
      spec:
        image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.145.0
        config:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318

          processors:
            batch: {}
            memory_limiter:
              check_interval: 1s
              limit_percentage: 75
              spike_limit_percentage: 15

          exporters:
            debug:
              verbosity: detailed
            otlp/tempo:
              endpoint: tempo.observability:4317
              tls:
                insecure: true
            prometheusremotewrite:
              endpoint: http://victoria-metrics-single-server.observability:8428/api/v1/write

          service:
            pipelines:
              traces:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [otlp/tempo]
              metrics:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [prometheusremotewrite]
              logs:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [debug]

    - apiVersion: opentelemetry.io/v1beta1
      kind: OpenTelemetryCollector
      metadata:
        name: logs-daemonset
        namespace: workshop
      spec:
        mode: daemonset
        image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.145.0
        volumeMounts:
          - name: varlogpods
            mountPath: /var/log/pods
            readOnly: true
        volumes:
          - name: varlogpods
            hostPath:
              path: /var/log/pods
        config:
          receivers:
            filelog:
              # Ne collecte que les pods du namespace 'observability'.
              # Chemin kubelet : /var/log/pods/<namespace>_<pod>_<uid>/<container>/<attempt>.log
              include: ["/var/log/pods/observability_*/*/*.log"]
              start_at: end
              include_file_path: false
              include_file_name: false
              operators:
                - type: container
                  id: container-parser
                  max_log_size: 102400

          processors:
            batch: {}
            memory_limiter:
              check_interval: 1s
              limit_percentage: 75
              spike_limit_percentage: 15

          exporters:
            debug:
              verbosity: detailed

          service:
            pipelines:
              logs:
                receivers: [filelog]
                processors: [memory_limiter, batch]
                exporters: [debug]

